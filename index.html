    <script>
// 検索用データベース（追加OK）
const songDatabase = [
    { title: "ハンガリー田園幻想曲", url: "works/doppler_hungarian_fantasy_page.html" },
    { title: "Hungarian Pastoral Fantasy", url: "works/doppler_hungarian_fantasy_page.html" },
    { title: "アンダンテとロンド Op.25", url: "#" },
    { title: "Andante and Rondo Op.25", url: "#" },
    { title: "ファンタジー『リゴレット』 Op.38", url: "#" },
    { title: "Fantasie on 'Rigoletto' Op.38", url: "#" },
    { title: "24 Caprices, Op. 26", url: "works/boehm_24caprices_op26_page.html" },
    { title: "24のカプリス Op.26", url: "works/boehm_24caprices_op26_page.html" },
    { title: "ベーム 24カプリス", url: "works/boehm_24caprices_op26_page.html" }
];


function showSuggestions(value) {
    const suggestionBox = document.getElementById("suggestions");
    suggestionBox.innerHTML = "";

    if (!value) return;

    // 部分一致で候補を抽出
    const filtered = songDatabase.filter(song =>
        song.title.toLowerCase().includes(value.toLowerCase())
    );

    // 結果なし
    if (filtered.length === 0) {
        suggestionBox.innerHTML = "<div class='suggestion-item'>該当なし</div>";
        return;
    }

    // 候補を並べる
    filtered.forEach(song => {
        const item = document.createElement("div");
        item.className = "suggestion-item";
        item.textContent = song.title;
        item.onclick = () => {
            document.getElementById("song-search").value = song.title;
            suggestionBox.innerHTML = "";
            window.location.href = song.url;  // ページに飛ぶ
        };
        suggestionBox.appendChild(item);
    });
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getFirestore, doc, runTransaction } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyCcae6xCiz-5DdW2h5Nqlqy15Lyz-joFS0",
    authDomain: "fluterepertoire-14c6f.firebaseapp.com",
    projectId: "fluterepertoire-14c6f",
    storageBucket: "fluterepertoire-14c6f.appspot.com",
    messagingSenderId: "201536501280",
    appId: "1:201536501280:web:6df67123b831f7f2022e45"
  };

  // 初期化
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // カウンターの参照
  const counterRef = doc(db, "counters", "pageView");

  // Firestore トランザクションで +1
  runTransaction(db, async (transaction) => {
    const docSnap = await transaction.get(counterRef);

    if (!docSnap.exists()) {
      transaction.set(counterRef, { count: 1 });
      return 1;
    }

    const newCount = docSnap.data().count + 1;
    transaction.update(counterRef, { count: newCount });
    return newCount;
  })
  .then((newCount) => {
    const formatted = String(newCount).padStart(6, '0'); // 6桁で0パディング
    document.getElementById("access-counter").innerText =
      `${formatted} 回`;
  })
  .catch((err) => {
    console.error(err);
    document.getElementById("access-counter").innerText =
      "アクセス数の取得に失敗しました";
  });

</script>
